<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

    <style>
         :root {
            --primary-color: #4f46e5;
            --background: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 500px;
        }
        
        h2 {
            margin-top: 0;
            margin-bottom: 4px;
            text-align: center;
            font-size: 24px;
            color: var(--text-main);
        }
        
        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
            background-color: #fff;
            color: var(--text-main);
            cursor: pointer;
        }
        
        input:focus {
            outline: 2px solid var(--primary-color);
            outline-offset: -1px;
        }
        
        .dropdown-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 6px;
            max-height: 220px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            margin-top: 4px;
            display: none;
        }
        
        .dropdown-list.show {
            display: block;
        }
        
        .dropdown-item {
            padding: 10px 14px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-main);
            transition: background 0.15s ease;
        }
        
        .dropdown-item:hover {
            background-color: #f3f4f6;
            color: var(--primary-color);
        }
        
        .results-section {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 2px dashed var(--border);
        }
        
        .results-grid {
            display: grid;
            gap: 12px;
        }
        
        .result-card {
            background: #f9fafb;
            padding: 14px 16px;
            border-radius: 8px;
            border-left: 4px solid var(--primary-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .result-left {
            display: flex;
            flex-direction: column;
        }
        
        .result-right {
            text-align: right;
        }
        
        .result-country {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
        }
        
        .result-city {
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .result-time {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-color);
        }
        
        .result-date {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }
    </style>
</head>

        // 2. Dynamic dropdown filter rendering engine
        function buildDropdownList(filterText = "") {
            dropdownOptions.innerHTML = "";
            const searchWord = filterText.toLowerCase();

            countriesList.forEach(item => {
                if (searchWord && !item.name.toLowerCase().includes(searchWord)) {
                    return;
                }

                const div = document.createElement('div');
                div.className = 'dropdown-item';
                div.textContent = item.name;

                // Fixed execution click handler
                div.addEventListener('click', (e) => {
                    e.stopPropagation();
                    baseInput.value = item.name;
                    activeCountryName = item.name;
                    activeTimezone = item.zone;
                    dropdownOptions.classList.remove('show');
                    processConversion();
                });

                dropdownOptions.appendChild(div);
            });

            if (dropdownOptions.children.length === 0) {
                const noResult = document.createElement('div');
                noResult.className = 'dropdown-item';
                noResult.style.color = 'var(--text-muted)';
                noResult.style.cursor = 'default';
                noResult.textContent = "No countries match...";
                dropdownOptions.appendChild(noResult);
            }
        }

        // 3. Time zone conversion calculations calculator
        function processConversion() {
            const [hours, minutes] = baseTimeInput.value.split(':');
            const now = new Date();

            try {
                const baseFormatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: activeTimezone,
                    year: 'numeric',
                    month: 'numeric',
                    day: 'numeric'
                });
                const baseDateString = baseFormatter.format(now);
                const anchorDate = new Date(`${baseDateString} ${hours}:${minutes}`);

                cards.forEach(card => {
                    const targetZone = card.getAttribute('data-timezone');

                    const timeStr = new Intl.DateTimeFormat('en-US', {
                        hour: '2-digit',
                        minute: '2-digit',
                        hour12: true,
                        timeZone: targetZone
                    }).format(anchorDate);

                    const dateStr = new Intl.DateTimeFormat('en-US', {
                        weekday: 'short',
                        month: 'short',
                        day: 'numeric',
                        timeZone: targetZone
                    }).format(anchorDate);

                    card.querySelector('.result-time').textContent = timeStr;
                    card.querySelector('.result-date').textContent = dateStr;
                });
            } catch (err) {
                console.error(err);
            }
        }

        baseInput.addEventListener('click', (e) => {
            e.stopPropagation();
            baseInput.value = "";
            buildDropdownList("");
            dropdownOptions.classList.add('show');
        });

        // Real-time keyword filter loop
        baseInput.addEventListener('input', (e) => {
            buildDropdownList(e.target.value);
            dropdownOptions.classList.add('show');
        });

        // Handle clicks outside the area safely to protect system health
        window.addEventListener('click', () => {
            if (dropdownOptions.classList.contains('show')) {
                baseInput.value = activeCountryName;
                dropdownOptions.classList.remove('show');
            }
        });

        baseTimeInput.addEventListener('input', processConversion);

        generateGlobalCountryList();
        baseInput.value = activeCountryName;
        buildDropdownList();
